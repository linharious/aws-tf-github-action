name: "Publish Terraform Module"

on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "src/modules/cc-vpc/**"
  release:
    types: [published]

jobs:
  publish:
    name: "Publish ${{ matrix.module }} to JFrog"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    strategy:
      fail-fast: false
      matrix: 
        module: 
          - cc-vpc
          - cc-tf-state

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://jfrogcfv.jfrog.io
        with:
          oidc-provider-name: github-jfrog
          oidc-audience: test

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ matrix.module }} to JFrog
        working-directory: src/modules/${{ matrix.module }}
        run: |
          jf tf p \
            --namespace=jfrog \
            --provider=aws \
            --tag=${{ steps.ver.outputs.version }}

    