name: "Terraform"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # env:
    #   AWS_DEFAULT_REGION: us-west-2
    #   AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
    #   AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::987213268383:role/aws-tf-gha-github-actions-role
          aws-region: ca-central-1

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://jfrogcfv.jfrog.io
        with:
          oidc-provider-name: github-jfrog
          oidc-audience: test

      - name: Bootstrap S3 State Bucket
        run: |
          aws s3api create-bucket \
            --bucket tf-state-ca-central-202606 \
            --region ca-central-1 \
            --create-bucket-configuration LocationConstraint=ca-central-1 \
            2>/dev/null || true

          aws s3api put-bucket-versioning \
            --bucket tf-state-ca-central-202606 \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket tf-state-ca-central-202606 \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init -migrate-state

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color

      # - name: JFrog Xray Scan
      #   run: jf audit --format=table

      - name: Terraform Apply
        run: terraform apply -auto-approve
