name: "Terraform"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # env:
    #   AWS_DEFAULT_REGION: us-west-2
    #   AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
    #   AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::080147880634:oidc-provider/token.actions.githubusercontent.com
          role-session-name:
          aws-region: us-west-2

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://trialh9yx8a.jfrog.io
        with:
          oidc-provider-name: github-jfrog
          oidc-audience: test

      # - name: Configure Terraform credentials for JFrog
      #   run: |
      #     JFROG_ACCESS_TOKEN=$(jf access-token-create --expiry=3600 --format=json | jq -r '.access_token')
      #     cat > ~/.terraformrc << EOF
      #     credentials "trialh9yx8a.jfrog.io" {
      #       token = "$JFROG_ACCESS_TOKEN"
      #     }
      #     EOF

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color

      # - name: JFrog Xray Scan
      #   run: jf audit --format=table

      - name: Terraform Apply
        run: terraform apply -auto-approve
